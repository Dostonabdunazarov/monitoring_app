services:
  postgres:
    image: timescale/timescaledb:2.26.3-pg16
    container_name: iot_postgres
    environment:
      POSTGRES_DB: iot_monitoring
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: >
      postgres
      -c password_encryption=md5
      -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: monitoring_app/docker/api.Dockerfile
    container_name: iot_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=iot_monitoring;Username=iot_user;Password=iot_password
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://127.0.0.1:5173
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: monitoring_app/docker/worker.Dockerfile
    container_name: iot_worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=iot_monitoring;Username=iot_user;Password=iot_password
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: iot-monitoring-frontend/Dockerfile
    container_name: iot_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
